name: Deploy to ECR + EC2

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Image to build & deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - api
          - indexer

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs: 

  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Unit tests
        run: go test -v -race -count=1 ./...

  # ── 2. Build & push both images to ECR (parallel) ────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        app: ${{ github.event_name == 'workflow_dispatch' && inputs.app != 'both' && fromJSON(format('["{0}"]', inputs.app)) || fromJSON('["api","indexer"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.app == 'api' && secrets.ECR_REPO_API || secrets.ECR_REPO_INDEXER }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f cmd/${{ matrix.app }}/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── 3. Deploy to EC2 via SSH ──────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPO_API: ${{ secrets.ECR_REPO_API }}
          ECR_REPO_INDEXER: ${{ secrets.ECR_REPO_INDEXER }}
          IMAGE_TAG: ${{ github.sha }}
          APP: ${{ inputs.app || 'both' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPO_API,ECR_REPO_INDEXER,IMAGE_TAG,APP
          script: |
            aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $ECR_REGISTRY

            if [ "$APP" = "both" ]; then
              docker-compose -f ~/docker-compose.yml pull
              docker-compose -f ~/docker-compose.yml up -d
            else
              docker-compose -f ~/docker-compose.yml pull $APP
              docker-compose -f ~/docker-compose.yml up -d $APP
            fi
  